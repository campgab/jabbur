<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Jabbur</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img class="logo" src="img/jabbur.logo.png" alt="">
        <div class="procura">
            <input type="text" class="procura-txt" placeholder="Pesquisar">
            <a href="#" class="procura-btn">
                <img src="img/loupe.png" alt="lupa" width="20" height="20">
            </a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#cartas">Cartas</a></li>
                <li><a href="#produtos">Produtos</a></li>
                <li><a href="#pedidos">Pedidos</a></li>
                <li><a href="#nos">Nós</a></li>
            </ul>
        </nav>
        <a href="carrinho.html" target="_blank" class="cart">
            <img src="img/grocery-store.png" alt="carrinho de compras">
        </a>
        <a href="#"><button class="btn1">Contato</button></a>
        <a href="cadastro.html"><button class="btn2">Cadastro</button></a>
    </header>

    <section class="carrinho-section">
        <h2 class="title">Meu <span>Carrinho</span></h2>
        
        <div class="carrinho-container">
            <div class="carrinho-itens">
                
                <div class="carrinho-item">
                    <div class="item-img-container">
                        <img src="img/charizard.png" alt="Charizard">
                    </div>
                    <div class="item-info">
                        <h4>Charizard ex Terastal</h4>
                        <p class="item-categoria">Categoria: Cartas Avulsas</p>
                        <button class="btn-remover">Remover</button>
                    </div>
                    <div class="item-quantidade">
                        <button class="qtd-btn">-</button>
                        <input type="number" value="1" min="1">
                        <button class="qtd-btn">+</button>
                    </div>
                    <div class="item-preco-total">
                        R$ 349,90
                    </div>
                </div>

                <div class="carrinho-item">
                    <div class="item-img-container">
                        <img src="img/sleeves-pokeball.png" alt="Sleeves">
                    </div>
                    <div class="item-info">
                        <h4>Sleeves Pokébola (65 un.)</h4>
                        <p class="item-categoria">Categoria: Acessórios</p>
                        <button class="btn-remover">Remover</button>
                    </div>
                    <div class="item-quantidade">
                        <button class="qtd-btn">-</button>
                        <input type="number" value="2" min="1">
                        <button class="qtd-btn">+</button>
                    </div>
                    <div class="item-preco-total">
                        R$ 90,00
                    </div>
                </div>

            </div>

            <div class="carrinho-resumo">
                <h3>Resumo do Pedido</h3>
                <div class="resumo-linha">
                    <span>Subtotal</span>
                    <span>R$ 439,90</span>
                </div>
                <div class="resumo-linha">
                    <span>Frete</span>
                    <span class="frete-gratis">Grátis</span>
                </div>
                <div class="cupom-container">
                    <input type="text" placeholder="Cupom de Desconto">
                    <button class="btn-cupom">Aplicar</button>
                </div>
                <hr class="divisor-resumo">
                <div class="resumo-linha total-linha">
                    <span>Total</span>
                    <span>R$ 439,90</span>
                </div>
                <button class="btn-finalizar">Fechar Pedido</button>
                <a href="home.html#cartas" class="continuar-comprando">Continuar Comprando</a>
            </div>
        </div>
    </section>

</body>
</html>
