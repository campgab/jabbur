<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="body-cadastro">
    <header>
        <img class="logo" src="img/jabbur.logo.png" alt="">
        <div class="procura">
            <input type="text" class="procura-txt" placeholder="Pesquisar">
            <a href="#" class="procura-btn">
                <img src="img/loupe.png" alt="lupa" width="20" height="20">
            </a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#cartas">Cartas</a></li>
                <li><a href="#produtos">Produtos</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
                <li><a href="#pedidos">Pedidos</a></li>
                <li><a href="#nos">Nós</a></li>
            </ul>
        </nav>

        <div class="cart">
            <img src="img/grocery-store.png" alt="carro de compras">
        </div>
        <a href="#"><button class="btn1">Contato</button></a>
        <a href="cadastro.html"><button class="btn2">Cadastro</button></a>
        <a href="carrinho.html" target="_blank" class="cart">
            <img src="img/grocery-store.png" alt="carro de compras">
        </a>

    </header>
    <main class="principal">
        <form>
            <h1>Login Jabbur</h1>
            <div class="input-box">
                <input placeholder="Usuário" type="email">
                <i class="bx bxs-user"></i>
            </div>
            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="lembrar-me">
                <label>
                    <input type="checkbox">
                    Lembrar senha
                </label>
                <a href="#">Esqueci a senha</a>
            </div>

            <button type="submit" class="login">Login</button>

            <div class="registro">
                <p>Não tem uma conta? <a class="#">Cadastre-se</a></p>
            </div>

        </form>
    </main>
</body>

</html>
